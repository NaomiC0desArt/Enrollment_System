services:

    api:
        build:
            context: .
            dockerfile: UniversitySystem.API/Dockerfile
        ports:
            - "5238:8080"
        environment:
        - ASPNETCORE_ENVIRONMENT=Development
        - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=UniversityDb;User Id=sa;Password=Locura123;TrustServerCertificate=True
        - Jwt__Key=ThisIsMySuperSecretKeyForUniversityAPI123!
        - Jwt__Issuer=UniversityAPI
        - Jwt__Audience=UniversityFrontEnd
        - Jwt__ExpirationInMinutes=60
        - Email__Host=mailpit
        - Email__Port=1025
        - Email__From=noreply@university.local
        - ApiSettings__BaseUrl=http://localhost:5238
        depends_on:
            sqlserver:
                condition: service_healthy
        networks:
            - university-network
    
    sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        environment:
            - ACCEPT_EULA=Y
            - SA_PASSWORD=Locura123
        ports:
            - "1433:1433"
        volumes:
            - sqlserver-data:/var/opt/mssql
        healthcheck:
            test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P Locura123 -Q 'SELECT 1' -N -C"]
            interval: 10s
            timeout: 5s
            retries: 10
        networks:
            - university-network
        
    mailpit:
        image: axllent/mailpit
        ports:
            - "1025:1025"
            - "8025:8025"
        networks:
            - university-network

networks:
  university-network:
    driver: bridge

volumes:
  sqlserver-data:
